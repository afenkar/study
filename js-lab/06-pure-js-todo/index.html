<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>纯 JS Todo · Day 6</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <h1>Todo 清单</h1>
    <p class="hint">Day 6 综合项目：闭包 + 模块化 + localStorage</p>

    <form id="todo-form" class="todo-form">
      <input id="todo-input" type="text" placeholder="输入待办，回车添加" autocomplete="off" />
      <button type="submit">添加</button>
    </form>

    <div class="filters">
      <button data-filter="all" class="filter-btn active">全部</button>
      <button data-filter="active" class="filter-btn">进行中</button>
      <button data-filter="completed" class="filter-btn">已完成</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <footer class="footer">
      <span id="todo-count">0 项待办</span>
      <button id="clear-completed" type="button">清除已完成</button>
    </footer>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
