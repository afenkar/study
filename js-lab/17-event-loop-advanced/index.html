<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 17：事件循环进阶</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
    h1 { font-size: 1.25rem; }
    section { margin: 1.5rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; }
    .q { margin: 1rem 0; }
    .q label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
    input[type="text"] { width: 100%; max-width: 420px; padding: 0.35rem; }
    button { margin: 0.25rem 0.25rem 0.25rem 0; padding: 0.4rem 0.8rem; cursor: pointer; }
    pre { background: #f5f5f5; padding: 0.75rem; overflow-x: auto; border-radius: 4px; white-space: pre-wrap; font-size: 0.9rem; }
    .output { color: #0a7; font-weight: 600; min-height: 1.2em; }
    .hint { color: #666; font-size: 0.9rem; }
    code { background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Day 17 · 事件循环进阶 · 输出题</h1>
  <p class="hint">先<strong>预测</strong>顺序，再点「运行」对照 F12。最后填答案点验证。笔记：<code>notes/week04-day17-event-loop-advanced.md</code></p>

  <section>
    <h2>实验：async1 / async2 经典题</h2>
    <button id="btn-demo">运行（看 F12 控制台）</button>
    <pre class="output" id="out-demo">点击运行，对照预测顺序</pre>
  </section>

  <section>
    <h2>自测 · 8 题输出顺序</h2>
    <p class="hint">用逗号分隔，如 <code>1,3,2</code></p>

    <div class="q">
      <label>1. console.log('1'); setTimeout(()=&gt;console.log('2'),0); console.log('3');</label>
      <input id="q1" type="text" placeholder="1,3,2" />
    </div>

    <div class="q">
      <label>2. console.log('A'); Promise.resolve().then(()=&gt;console.log('B')); console.log('C');</label>
      <input id="q2" type="text" placeholder="A,C,B" />
    </div>

    <div class="q">
      <label>3. console.log('1'); setTimeout(()=&gt;console.log('2'),0); Promise.resolve().then(()=&gt;console.log('3')); console.log('4');</label>
      <input id="q3" type="text" />
    </div>

    <div class="q">
      <label>4. async foo(){ console.log('a'); await Promise.resolve(); console.log('b'); } console.log('c'); foo(); console.log('d');</label>
      <input id="q4" type="text" />
    </div>

    <div class="q">
      <label>5. async1(){ console.log('1'); await async2(); console.log('2'); } async2(){ console.log('3'); } console.log('4'); async1(); console.log('5');</label>
      <input id="q5" type="text" />
    </div>

    <div class="q">
      <label>6. console.log('start'); setTimeout(()=&gt;console.log('timeout'),0); Promise.resolve().then(()=&gt;console.log('promise')); async a(){ console.log('async1'); await null; console.log('async2'); } a(); console.log('end');</label>
      <input id="q6" type="text" />
    </div>

    <div class="q">
      <label>7. Promise.resolve().then(()=&gt;{ console.log('1'); Promise.resolve().then(()=&gt;console.log('2')); console.log('3'); }); Promise.resolve().then(()=&gt;console.log('4'));</label>
      <input id="q7" type="text" />
    </div>

    <div class="q">
      <label>8. async test(){ console.log('1'); setTimeout(()=&gt;console.log('2'),0); await Promise.resolve(); console.log('3'); } test(); console.log('4');</label>
      <input id="q8" type="text" />
    </div>

    <button id="btn-check">验证答案</button>
    <p class="output" id="out-check"></p>
  </section>

  <script type="module" src="main.js"></script>
</body>
</html>
